name: Iocgo CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    name: ${{ matrix.os }} - Go from go.mod
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Go from go.mod
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Get dependencies and tidy
        run: |
          make tidy
        env:
          GOPROXY: "https://proxy.golang.org,direct"

      - name: Check code formatting (gofmt)
        run: |
          FILES=$(gofmt -l .)
          if [ -n "$FILES" ]; then
            echo "The following files are not formatted correctly:"
            echo "$FILES"
            echo "Please run 'go fmt ./...' locally and commit the changes."
            exit 1
          fi
          echo "All files are formatted correctly."

      - name: Run tests
        run: |
          make test
        env:
          CGO_ENABLED: 0
