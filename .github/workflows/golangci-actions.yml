name: Iocgo CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    name: ${{ matrix.os }} - Go from go.mod
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Go from go.mod
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module files
        run: make verify-mod
        env:
          GOPROXY: https://proxy.golang.org,direct

      - name: Check formatting
        run: make fmt-check

      - name: Run tests
        run: make test
        env:
          CGO_ENABLED: 0
          GOPROXY: https://proxy.golang.org,direct

      - name: Build ioctl
        run: make build BINARY=/tmp/ioctl
        env:
          CGO_ENABLED: 0
          GOPROXY: https://proxy.golang.org,direct
