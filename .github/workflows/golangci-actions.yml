name: Nemo CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: "*"

jobs:
  build:
    name: ubuntu-latest - Go from go.mod
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v5

      - name: Get dependencies
        run: |
          make tidy

      - name: gofmt
        run: |
          go fmt ./...

      - name: test
        run: |
          make test